[flagship.limits]
proofs = """
Two attached theorems on ct_compare plus one helper lemma.
The universal same-tag theorem (ct_compare a a = 1 for any
16-byte input) closes both bar #1 and bar #2.  The full iff
direction (ct_compare a b = 1 ⟹ a = b) is open as a
stretch theorem — needs an inductive argument over byte
positions for the negative direction.  Helpers
(bitxor_u8_self_zero, bitor_u8_zero_zero,
ct_loop_iteration_invariant) are landed for the work.  The
oracle (see below) closes the negative direction
empirically until the theorem catches up.
"""
oracle = """
Python reference + differential harness.  600 cases across
three seeds (200 per seed); ~48 return 1 (equal), ~152
return 0 (differ).  Covers per-position single-byte diffs
(positions 0, 15, random middle), multiple-byte diffs,
all-byte-diffs, high-bit-only diffs.  Exercises the
negative direction the theorem does NOT yet cover.
"""
constant_time = """
THIS IS THE LOAD-BEARING LIMIT.  Source-level structural
constant-time discipline (no early exit, fixed loop bound,
no content-dependent branch inside the loop) is enforced by
manual review and by the source body fingerprint check; it
is NOT proved as a Concrete static guarantee today (no
constant_time profile exists; would require Phase 3 work).
Machine-level constant time is NEITHER proved NOR enforced
— LLVM may rewrite the branch-free idiom, target CPUs leak
through cache/branch predictor.  assumptions.toml's
[claims.machine_level_constant_time] entry records this as
assumed_not_proved.  Do not deploy ct_compare as your
auth-tag check; use a vetted crypto library.
"""
audience = """
Fourth graduated flagship; FIRST real-crypto flagship per
the explicit slot crypto_verify's toy-MAC graduation
reserved.  Targets reviewers evaluating Concrete's proof
workflow on crypto-adjacent code where the security claim
is subtle but the implementation is small.  NOT intended
for deployment — the README, CATCHES, and assumptions all
state this directly.  The pattern (small surface, subtle
property, honest backend assumption) is the template for
future real-crypto candidates (HMAC-SHA256, Ed25519 verify
subset).
"""

[[flagship]]
