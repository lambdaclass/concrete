# Curated Phase 7 showcase manifest.
#
# Each entry is a graduated flagship example: an example that has met
# every bar in its own AUDIT.md, carries a Lean-backed property, an
# assumption file, an enforced policy, a "Concrete catches this"
# negative pair, snapshot baselines, an oracle, an honest README, and
# a release evidence bundle is capturable on demand.
#
# Adding an example requires AUDIT.md to show 10 of 10 bars met.
# Removing an example is allowed only with a roadmap note explaining
# why (e.g., language churn forced retirement; in that case the
# example moves to an "archived" section).
#
# CI gate: scripts/tests/check_showcase.sh (make test-showcase)
# walks every entry, runs its drift-enforced CI gates
# (policy/assumptions/catches/snapshots), and asserts the release
# bundle still captures cleanly. Drift is a real signal.

schema_version = 1

[[flagship]]
example     = "parse_validate"
path        = "examples/parse_validate"
graduated   = "2026-05-22"
audit       = "examples/parse_validate/AUDIT.md"
readme      = "examples/parse_validate/README.md"
thesis_role = "Capability-pure, predictable validation core with one Lean composition theorem and a drift-enforced negative pair."

# Bars met (must be 10/10 to be listed here).
[flagship.bars]
proved_property        = true   # bar #1
composition_property   = true   # bar #2
assumption_file        = true   # bar #3
policy_file            = true   # bar #4
oracle_beyond_handwritten = true   # bar #5
negative_pair          = true   # bar #6
release_bundle         = true   # bar #7
honest_readme          = true   # bar #8
snapshot_baseline      = true   # bar #9
on_showcase_manifest   = true   # bar #10 — this entry

# Evidence pointers — what a reviewer reads to audit the claims.
[flagship.evidence]
proof_registry = "examples/parse_validate/src/proof-registry.json"
proofs         = ["Concrete.Proof.validate_version_correct",
                  "Concrete.Proof.validate_header_fields_success",
                  "Concrete.Proof.parse_header_too_short"]
assumptions    = "examples/parse_validate/assumptions.toml"
policy         = "examples/parse_validate/Concrete.toml"
catches        = "examples/parse_validate/catches/"
catches_doc    = "examples/parse_validate/CATCHES.md"
snapshots      = "examples/parse_validate/snapshot/"
oracle         = "examples/parse_validate/oracle/"

# CI gates that enforce this entry's contract. Drift fails the gate.
[flagship.gates]
policy       = "make test-policy"
assumptions  = "make test-assumptions"
catches      = "make test-catches"
snapshots    = "make test-snapshots"
oracle       = "make test-pv-oracle"
verify_gates = "make test-verify-gates"
release_bundle = "make test-release-bundle"

# Known limits — honest framing.
[flagship.limits]
proofs = """
Two attached theorems: validate_version (full correctness) and
validate_header_fields_success (positive direction of the
composition). The Result-returning parse_header on the array input
is blocked on Phase 4 ProofCore extensions (array indexing, enum
construction, struct construction). The composition iff
(failure direction with return code matching the first failing
check) is left as future work — the 256-branch case split exhausts
heartbeats today.
"""
oracle = """
Reference implementation is in Python, not Lean. Two independent
implementations of the same spec, agreeing across 600 cases (three
seeds). Stronger oracle (Lean equivalence proof) waits on the
ProofCore extensions above.
"""
audience = """
This is the first graduated flagship. The audience that benefits
from parse_validate's evidence today is narrow: reviewers auditing
a pure-int validator under wrapping i32 arithmetic on a hosted-libc
target. Broader systems audiences need the flagship corpus to
grow.
"""

[[flagship]]
example     = "crypto_verify"
path        = "examples/crypto_verify"
graduated   = "2026-05-23"
audit       = "examples/crypto_verify/AUDIT.md"
readme      = "examples/crypto_verify/README.md"
thesis_role = """
Toy authenticated-tag model demonstrating PROOF SCAFFOLDING for
authentication, not real cryptographic security. The tag function
key*message+nonce is invertible and offers no secrecy. The
graduation is of the proof-composition pattern, the
allocation/capability discipline, and the honest-assumption story
— NOT of the underlying algorithm. A future flagship using a real
HMAC / Ed25519 / constant-time primitive would be a sibling entry,
not a replacement; this entry exists so the proof scaffolding has
a registered home today.
"""

[flagship.bars]
proved_property        = true   # bar #1 — 4 functions proved
composition_property   = true   # bar #2 — verify_message_composed_correct
assumption_file        = true   # bar #3
policy_file            = true   # bar #4 — 8 enforced fields
oracle_beyond_handwritten = true   # bar #5 — 600 differential cases
negative_pair          = true   # bar #6 — alloc-in-pure-core
release_bundle         = true   # bar #7
honest_readme          = true   # bar #8
snapshot_baseline      = true   # bar #9 — 16 reports
on_showcase_manifest   = true   # bar #10 — this entry

[flagship.evidence]
proof_registry = "examples/crypto_verify/src/proof-registry.json"
proofs         = ["Concrete.Proof.compute_tag_correct",
                  "Concrete.Proof.verify_tag_correct",
                  "Concrete.Proof.check_nonce_correct",
                  "Concrete.Proof.verify_message_composed_correct"]
assumptions    = "examples/crypto_verify/assumptions.toml"
policy         = "examples/crypto_verify/Concrete.toml"
catches        = "examples/crypto_verify/catches/"
catches_doc    = "examples/crypto_verify/CATCHES.md"
snapshots      = "examples/crypto_verify/snapshot/"
oracle         = "examples/crypto_verify/oracle/"

[flagship.gates]
policy         = "make test-policy"
assumptions    = "make test-assumptions"
catches        = "make test-catches"
snapshots      = "make test-snapshots"
oracle         = "make test-cv-oracle"
verify_gates   = "make test-verify-gates"
release_bundle = "make test-release-bundle"

[flagship.limits]
algorithm = """
NOT real cryptography. compute_tag(k, m, n) = k * m + n is
invertible; the "key" offers no secrecy. The source docstring,
README, AUDIT, and CATCHES all state this directly. This is a
demonstrator of proof STRUCTURE, not of cryptographic security.

A real flagship using HMAC-SHA256, Ed25519 verification, or
constant-time tag comparison would be a separate entry. Such a
flagship is gated on Phase 4 ProofCore extensions (array indexing,
bounded while loops, struct construction) — without those, the
algorithm's inner loop cannot extract into ProofCore, and the
proof story would be no better than the toy.
"""
proofs = """
Four attached theorems all surface as `proved`. The composition
theorem proves the success direction (both validators succeed →
returns 1); the failure direction is per-failure follow-up
theorems, same shape as parse_validate's composition.
"""
oracle = """
Python reference implementation, not Lean. 600 differential cases
across three seeds agree with the Concrete binary. A Lean
equivalence proof would be stronger but waits on the same Phase 4
extensions named above.
"""
audience = """
Reviewers wanting to see the proof scaffolding pattern that a real
cryptographic primitive flagship would use. The audience for
crypto_verify's evidence today is engineers evaluating Concrete's
PROOF WORKFLOW, not engineers needing a verified MAC for
production. The Phase 7 catalog graduates the scaffolding; the
algorithm catalog waits for Phase 4.
"""
