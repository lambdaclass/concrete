thesis_role = """
Fifth flagship and the deepest proof artifact: a full
HMAC-SHA256 (FIPS 180-4 + RFC 4231) whose ENTIRE
composition chain is kernel-verified and tied to the
extracted source through the spec-drift gate.  Eleven
registered proofs — the two bar-#1 point theorems plus
nine full-contract refinements covering block_to_words,
the message schedule, the round function, single- and
offset-block compression, state serialization, the
multi-block padded hash, and the outer HMAC ipad/opad
construction.  The composition theorem
(hmac_sha256_refines_spec) proves the extracted body
computes exactly an independent BitVec model
(Sha256Spec.hmac) for all inputs in the documented bounds.
This is the first flagship where the proof is about the
EXACT extracted source body (not a hand model): the
registered spec equals the source-extracted PExpr, so a
source edit turns the proof stale.  The loop-induction
milestone (eval_while_count over 64-round / multi-block
loops, not 64x unfolding) the earlier flagships pointed at.
"""

