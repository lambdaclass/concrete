[flagship.limits]
proofs = """
Eleven kernel-verified registered proofs covering the full
chain (see [flagship.evidence].proofs).  The refinement
theorems hold for inputs within documented bounds: key
length k_len <= 128, message length m_len <= 256, and the
hashed buffer len <= 375 (one to six 64-byte blocks) — the
bound under which the multi-block count nblocks <= 6 and the
fixed-fuel evaluation closes.  These bounds cover the RFC
4231 test-vector regimes and the oracle's case space; they
are LIMITS, not full generality (an unbounded-length proof
would need a fuel-parametric induction over nblocks).  The
proofs are over the interpreter's eval semantics of the
extracted PExpr against an independent BitVec spec
(Sha256Spec); the BitVec spec itself is the trusted
reference (cross-checked against the RFC vectors and the
Python oracle), not separately proved equal to a third
model.
"""
oracle = """
Python hmac.new(...) differential harness.  200 cases/seed
x 3 seeds = 600 total, across all length regimes (empty,
short, block-boundary, long-key > 64 forcing the key-hash
branch, multi-block message).  Covers the input space the
bounded refinement theorems are stated over and the long
tail beyond it.
"""
deployment = """
THE LOAD-BEARING LIMIT.  This is a teaching/showcase
artifact, NOT a deployment-grade crypto library.  The proofs
establish functional correctness (output equals the FIPS/RFC
math) of the extracted source under the interpreter
semantics; they say NOTHING about machine-level constant
time, side channels, or the LLVM backend's lowering.  Do not
use this for real authentication; use a vetted library
(libsodium, ring, the platform crypto).  assumptions.toml
records the trusted edges.
"""
audience = """
Fifth graduated flagship; the deepest proof artifact and the
realization of the loop-induction / composition milestone the
earlier flagships pointed at.  Targets reviewers evaluating
whether Concrete's evidence-carrying thesis holds at the
scale of a real, multi-function crypto primitive: not just
"a theorem is attached" but "the whole call graph is proved
and every link is tied to the exact source through the
spec-drift gate."
"""
