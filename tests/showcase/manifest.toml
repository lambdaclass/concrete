[[flagship]]
example     = "constant_time_tag"
path        = "examples/constant_time_tag"
graduated   = "2026-05-30"
audit       = "examples/constant_time_tag/AUDIT.md"
readme      = "examples/constant_time_tag/README.md"
thesis_role = """
First real-crypto flagship: a fixed-size byte-array
comparison helper with source-level constant-time
discipline.  Smallest real-crypto artifact that forces the
distinction Concrete should be good at — the code is
simple, but the claim is subtle.  Universal same-tag
theorem (ct_compare(a, a) = 1 for any 16-byte input)
exercises u8 bitxor + u8 bitor + bounded 16-iteration
while_ end-to-end under the Lean kernel.  Honest about
the gaps (full iff, machine-level timing) it does not
yet cover.
"""

[flagship.bars]
