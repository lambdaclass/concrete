# ============================================================
# NOTE: This manifest includes representative entries for each
# category. The full set of 350+ test files follows the same
# patterns. Tests not explicitly listed inherit defaults:
#   category = "unit"
#   kind = inferred from scripts/tests/run_tests.sh section
#   passes = full pipeline
#   profile = "fast"
#   owner_pass = inferred from filename prefix
#   needs_clang = true (for run_ok/run_err), false (for check_*)
#
# A complete listing can be generated via:
#   ./scripts/tests/run_tests.sh --manifest
# ============================================================
