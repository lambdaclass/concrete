# Test Manifest — reference metadata for all test cases
#
# This file is NOT consumed by scripts/tests/run_tests.sh. Test execution is driven
# by the shell script's section structure. This manifest captures the
# metadata that the shell sections encode implicitly, making it
# queryable and auditable for documentation and future tooling.
#
# Used by:
# - docs/TESTING.md coverage matrix (reference data)
# - future tooling for test selection and reporting
#
# Fields per test entry:
#   file        — path relative to repo root
#   category    — semantic category (see categories below)
#   kind        — execution kind: "run_ok", "run_err", "run_abort", "run_test",
#                 "check_report", "check_codegen", "check_O2", "lean_pass"
#   passes      — which compiler passes this test exercises
#   profile     — run profile: "fast", "slow", "network"
#   expected    — expected output (exit code, string match, etc.)
#   owner_pass  — primary compiler pass whose correctness this test defends
#   needs_clang — whether the test requires clang (false for pass-level/report-only)
#   multi_module— whether the test uses `mod X;` file imports

# ============================================================
# Categories
# ============================================================
#
# unit          — single language feature in isolation
# semantic      — type checking, linearity, capability, name resolution
# lowering      — Core-to-SSA lowering behavior
# codegen       — LLVM IR structure, optimization, differential
# report        — --report mode output verification
# integration   — multi-feature realistic programs
# stress        — large/deep programs testing compiler limits
# stdlib        — stdlib module in-language #[test] coverage
# regression    — named bug reproductions
# property      — invariant/round-trip/trace tests
# fuzz          — random/malformed input crash resistance

# ============================================================
# Compiler pass names (for passes and owner_pass fields)
# ============================================================
#
# parse         — Concrete.Parser (source → AST)
# resolve       — Concrete.Resolve (name resolution)
# check         — Concrete.Check (type/capability/linearity checking)
# elab          — Concrete.Elab (elaboration to Core IR)
# core_check    — Concrete.CoreCheck (post-elaboration validation)
# mono          — Concrete.Mono (monomorphization)
# lower         — Concrete.Lower (Core → SSA)
# ssa_verify    — Concrete.SSAVerify (SSA invariant checking)
# ssa_cleanup   — Concrete.SSACleanup (SSA optimization)
# emit_ssa      — Concrete.EmitSSA (SSA → LLVM IR)
# clang         — external clang compilation
# runtime       — runtime execution behavior
# summary       — Concrete.FileSummary (cross-module summaries)
# report        — Concrete.Report (audit report generation)
# format        — Concrete.Format (source formatter)

# ============================================================
# Pass-level Lean tests (Concrete/PipelineTest.lean)
# ============================================================

[[test]]
file = "Concrete/PipelineTest.lean"
category = "unit"
kind = "lean_pass"
passes = ["parse", "check", "elab", "mono", "lower", "ssa_verify", "ssa_cleanup", "emit_ssa"]
profile = "fast"
owner_pass = "all"
needs_clang = false
multi_module = false
description = "19+ pass-level tests exercising individual compiler passes on in-memory source strings"

# ============================================================
# Positive tests — compile-and-run, expect specific exit code
# ============================================================

