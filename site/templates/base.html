<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page and page.title %}{{ page.title }} | {% elif section and section.title %}{{ section.title }} | {% endif %}{{ config.title }}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="stylesheet" href="{{ get_url(path='site.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-bar">
      <a class="brand" href="{{ get_url(path='@/_index.md') }}">
        <img src="{{ get_url(path='logo.png') }}" alt="Concrete logo" width="128" height="128">
      </a>
      <div class="header-main">
        <div class="header-title">
          <h1><a href="{{ get_url(path='@/_index.md') }}">Concrete documentation</a></h1>
        </div>
        <nav class="main-nav">
        <a href="{{ get_url(path='@/_index.md') }}">Home</a>
        <a href="{{ get_url(path='@/reference/_index.md') }}">Docs</a>
        <a href="{{ get_url(path='@/guide/_index.md') }}">Guide</a>
        <a href="{{ get_url(path='@/paper.md') }}">Paper</a>
        <a href="{{ config.extra.repo_url }}">Repository</a>
        </nav>
      </div>
    </div>
  </header>
  <main class="wrap page-shell">
    {% block content %}{% endblock content %}
  </main>
</body>
</html>
