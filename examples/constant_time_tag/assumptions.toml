# Assumption file for the constant_time_tag candidate.
# Schema: docs/ASSUMPTION_FILES.md
#
# Active pull-through candidate (slot opened 2026-05-28).
# First real-crypto candidate per the explicit slot reserved
# by crypto_verify's toy-MAC graduation framing.  See AUDIT.md.

schema_version = 1

[target]
host      = "any"
toolchain = "llvm"
runtime   = "hosted-libc"

[arithmetic]
# u8 for tag bytes; i32 for loop counter and return.  Checked
# (trapping) arithmetic is the default in every profile, predictable
# included; wrapping needs the explicit wrapping_* intrinsics.
overflow       = "trap"
divide_by_zero = "trap"
shift_oversize = "trap"

[allocation]
# Zero heap.  Tag arrays are passed by value as [u8; 16];
# `diff` is a u8 local; the return is i32.
heap            = "none"
stack_max_bytes = 256    # actual measured: 209 bytes (small headroom)

[authority]
# Entry point uses Console (narrower than Std) for println.
# ct_compare itself is pure.  No trusted shells, no FFI.
required  = ["Console"]
forbidden = ["File", "Net", "Unsafe", "Alloc"]

[ffi]
externs = []

[trusted]
# Stricter than fixed_capacity: no trusted shells at all.
# Tag arrays are constructed via [u8; 16] literals; no raw byte
# writes required.
functions = []
shells    = []

[proof]
provable_subset = "predictable-byte-array-with-bitwise-and-loop"
trust_anchor    = "Lean kernel + Concrete.Proof.*"

# ============================================================
# Honest claim boundaries — what is and is NOT proved.
# These entries are load-bearing for the candidate's framing;
# the README must echo them and the showcase manifest's
# [flagship.limits] must reference them.
# ============================================================

[claims.functional_correctness]
status      = "pending"
description = """
ct_compare(a, b) returns 1 iff a and b are byte-equal at all
16 positions, 0 otherwise.  This is the functional-correctness
claim; the Lean theorem will pin it once the Phase 4 forcing
surface (u8 bitor / u8 bitxor in PBinOp; multi-iteration
universal-property while_step proof) lands.
"""

[claims.structural_constant_time]
status      = "statically_enforced"
description = """
At the SOURCE level, ct_compare:
  * has no `return` inside the loop body (no early exit);
  * uses a compile-time constant loop bound (16);
  * has no content-dependent branch inside the loop (the
    OR-accumulate is branch-free).
These properties are visible in --report unsafe and
--report eligibility, and any future change that violates
them will surface as drift (the source body fingerprint
will change and the snapshot diff will fire).
"""

[claims.machine_level_constant_time]
status      = "assumed_not_proved"
description = """
THIS IS THE LOAD-BEARING GAP.  The source's structural
constant-time properties (claims.structural_constant_time)
are NECESSARY but NOT SUFFICIENT for true constant-time
execution at the machine level.  Specifically:

  * LLVM may optimize `if diff == 0 { 1 } else { 0 }` into
    a conditional jump rather than a branch-free select.
    Compile with -O0, or with a wrapper that uses
    asm-volatile or a manual branchless idiom, if you need
    constant-time at the machine level.
  * Target CPUs leak through cache, branch predictor, and
    speculative execution.  Constant-time-at-source does
    not prevent these.
  * Sanitizers, profilers, and instrumentation may
    introduce data-dependent code paths.

Concrete does NOT have target-level timing proofs today.
A future Phase 3 (Runtime) extension may add a
constant-time-by-target evidence track.  Until then, this
candidate's machine-level claim is an assumption the
deployer must validate.
"""

[claims.deployment_audience]
status      = "informational"
description = """
This candidate is NOT a substitute for vetted crypto
libraries.  Audience is reviewers evaluating Concrete's
proof workflow on crypto-adjacent code where the security
claim is subtle but the implementation is small.  Do not
deploy ct_compare as your auth-tag check; use a vetted
constant-time-comparison primitive from a maintained
cryptographic library.
"""
