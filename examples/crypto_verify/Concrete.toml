[package]
name = "crypto_verify"

# Enforceable budgets per docs/POLICY_FILES.md.
# CI gate: make test-policy.
[policy]
predictable            = true
no_alloc               = true
no_unsafe              = true
no_trusted             = true
no_externs             = true
max_stack_bytes        = 200
forbidden_capabilities = ["Alloc", "File", "Net", "Unsafe", "Console", "Clock"]
allowed_capabilities   = []
deny                   = ["Unsafe"]
